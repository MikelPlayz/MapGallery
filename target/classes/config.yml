  # Main plugin configuration for MapGallery.
discord:
  # Discord bot token. Leave empty to disable the bot safely.
  token: ""
  # Target guild/server ID where commands and moderation occur.
  guild-id: 0
  # Channel ID for staff review messages. Bot posts normal messages here.
  review-channel-id: 0
  # Optional log channel ID for approvals.
  log-channel-approved-id: 0
  # Optional log channel ID for denials.
  log-channel-denied-id: 0
  # Role IDs that are allowed to approve/deny via reactions.
  staff-role-ids: []
  # User IDs explicitly allowed to approve/deny.
  staff-user-ids: []
  # If true, DM submitter when approved/denied.
  dm-result: true

submission:
  # Maximum allowed uploaded file size in bytes.
  max-file-size-bytes: 2097152
  # Allowed filename suffixes/extensions.
  allowed-image-types:
    - .png
    - .jpg
    - .jpeg
    - .webp
  # If true, non-64x64 images are resized to 64x64. If false, rejected.
  resize-to-64x64: true

maps:
  # Display naming format for approved maps.
  naming-format: "%user% - %title%"

gallery:
  # GUI title used for inventory browser.
  gui-title: "Map Gallery"
  # Number of map entries displayed per page (max practical in 54-slot inventory is 45).
  page-size: 45

permissions:
  # Permission nodes documented for server administrators.
  gallery: "mapgallery.gallery"
  give: "mapgallery.give"
  admin: "mapgallery.admin"
  reload: "mapgallery.reload"

# Enable maximum plugin diagnostics. When true, debug traces and full stack traces
debug: false
